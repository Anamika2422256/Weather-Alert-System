name: Weather Alert

on:
  on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  weather-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python weather.py
